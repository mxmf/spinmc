version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      rust-random:
        patterns:
          - "rand"
          - "rand_core"
          - "rand_pcg"
          - "rand_distr"
          - "rand_chacha"
          - "getrandom"
    ignore:
      - dependency-name: "hdf5-metno"
        versions: [">= 0.13.0"]
      - dependency-name: "ndarray"
        versions: [">= 0.17.0"]
